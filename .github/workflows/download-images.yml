          echo "Downloads complete"

      - name: Verify downloads
        run: |
          echo "Files > 1KB:"
          find img/galeri -size +1k -exec ls -la {} \; || true
          echo "Logo:"
          ls -la assets/logo.jpg || echo "Logo not found"

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add img/galeri/ assets/logo.jpg assets/founder.jpg assets/hero-photo.jpg
          git status
          if git diff --staged --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "Add Instagram images downloaded via GitHub Actions"
            git push origin main
          fi
